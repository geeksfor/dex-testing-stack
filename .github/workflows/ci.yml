name: ci

on:
  pull_request:
  push:
    branches: [ main ]

# 同一分支/PR 的旧流水线自动取消
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  # PNPM_VERSION: "9"
  FOUNDRY_PROFILE: "default"

jobs:
  # -------------------------
  # 1) Contracts: Fast checks
  # -------------------------
  contracts-matrix:
    name: contracts-${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        suite: [unit, fuzz, invariant]

    defaults:
      run:
        working-directory: packages/contracts-foundry

    steps:
      - uses: actions/checkout@v4

      # Foundry 安装
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # 缓存 Foundry/forge
      - name: Cache Foundry
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            packages/contracts-foundry/lib
          key: ${{ runner.os }}-foundry-${{ hashFiles('packages/contracts-foundry/foundry.toml') }}-${{ hashFiles('packages/contracts-foundry/**/remappings.txt', 'packages/contracts-foundry/**/foundry.lock') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      # 安装 forge-std（若 lib 已缓存会非常快）
      - name: Install forge-std
        run: |
          if [ ! -d "lib/forge-std" ]; then
            forge install foundry-rs/forge-std --no-git
          else
            echo "forge-std already exists, skipping install"
          fi

      - name: Forge fmt (check)
        run: forge fmt --check

      # 按 suite 分别跑，定位更快
      - name: Forge test (unit)
        if: matrix.suite == 'unit'
        run: forge test -vvv --match-path "test/*.unit.t.sol"

      - name: Forge test (fuzz)
        if: matrix.suite == 'fuzz'
        run: forge test -vvv --match-path "test/*.fuzz.t.sol"

      - name: Forge test (invariant)
        if: matrix.suite == 'invariant'
        run: forge test -vvv --match-path "test/*.invariant.t.sol"

  # -------------------------
  # 2) Contracts: Coverage (only on main push)
  # -------------------------
  contracts-coverage:
    name: contracts-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: packages/contracts-foundry

    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Foundry
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            packages/contracts-foundry/lib
          key: ${{ runner.os }}-foundry-${{ hashFiles('packages/contracts-foundry/foundry.toml') }}-${{ hashFiles('packages/contracts-foundry/**/remappings.txt', 'packages/contracts-foundry/**/foundry.lock') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      # - name: Install forge-std
      #   run: forge install foundry-rs/forge-std --no-git

      - name: Forge coverage (lcov)
        run: |
          forge coverage --report lcov
          test -f lcov.info && echo "lcov generated"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-lcov
          path: packages/contracts-foundry/lcov.info
          if-no-files-found: error

  # -------------------------
  # 3) UI tests (fast on PR + main)
  # -------------------------
  ui-tests:
    name: ui-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: packages/ui-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # 关键：让 pnpm store 可缓存
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml', 'packages/ui-tests/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 推荐：monorepo 在根安装依赖更稳
      - name: Install deps (workspace root)
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      # Playwright 浏览器缓存（默认路径 ~/.cache/ms-playwright）
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('packages/ui-tests/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-

      - name: Install Playwright browsers (if needed)
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/ui-tests/playwright-report
            packages/ui-tests/test-results
          if-no-files-found: ignore